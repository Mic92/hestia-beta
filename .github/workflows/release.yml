# Release pipeline: tag push -> static binaries -> GitHub release.
#
# The binaries are statically linked (musl, see packages.static in
# flake.nix): the hestia-cache action downloads and runs them on stock
# runners, where dynamically linked nix-built binaries would not work
# (their library paths point into /nix/store).
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    strategy:
      # One architecture failing should not cancel the other; partial
      # results make failures easier to debug.
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            system: x86_64-linux
          - runner: ubuntu-24.04-arm
            system: aarch64-linux
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: NixOS/nix-installer-action@main
      # The arm64 hosted runners have 16 GB RAM and no swap; parallel rustc
      # invocations during the static build have OOM-killed the runner VM
      # (it reports "received a shutdown signal" mid-build). Swap turns the
      # spike into slowdown instead of a dead runner. The x86_64 runners
      # already ship a /swapfile, so use a separate path and keep the step
      # idempotent.
      - name: Add swap
        run: |
          sudo fallocate -l 8G /swapfile-hestia
          sudo chmod 600 /swapfile-hestia
          sudo mkswap /swapfile-hestia
          sudo swapon /swapfile-hestia
      - name: Build static binary
        run: nix build .#static
      - name: Prepare release asset
        run: |
          set -euo pipefail
          install -m755 result/bin/hestia "hestia-${{ matrix.system }}"
          sha256sum "hestia-${{ matrix.system }}" | tee "hestia-${{ matrix.system }}.sha256"
      - uses: actions/upload-artifact@v7
        with:
          name: hestia-${{ matrix.system }}
          path: |
            hestia-${{ matrix.system }}
            hestia-${{ matrix.system }}.sha256
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      # Creating the release and uploading assets.
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          # Pre-1.0 / hyphenated tags (v0.1.0-alpha.1) are pre-releases.
          prerelease=()
          case "$tag" in
            *-*) prerelease=(--prerelease) ;;
          esac

          # Release notes: usage snippet with the real sha256 values, so the
          # release is copy-paste usable; --generate-notes appends the
          # auto-generated changelog below it.
          sha256_x86_64=$(cut -d' ' -f1 hestia-x86_64-linux.sha256)
          sha256_aarch64=$(cut -d' ' -f1 hestia-aarch64-linux.sha256)
          cat > notes.md <<EOF
          > ⚠️ **Alpha software**: APIs, cache format, and behavior may change without notice.

          ## Usage

          \`\`\`yaml
          - uses: Mic92/hestia/action@${tag}
            with:
              version: ${tag}
              sha256: ${sha256_x86_64}   # x86_64-linux
          \`\`\`

          ## Checksums (SHA-256)

          | Asset | Digest |
          |---|---|
          | hestia-x86_64-linux | \`${sha256_x86_64}\` |
          | hestia-aarch64-linux | \`${sha256_aarch64}\` |
          EOF

          gh release create "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$tag" \
            --notes-file notes.md \
            --generate-notes \
            "${prerelease[@]}" \
            hestia-*
