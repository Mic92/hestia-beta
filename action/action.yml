name: hestia-cache
# Marketplace limits this to 125 characters; the long-form blurb lives in
# action/README.md.
description: >
  Nix binary cache backed by the GitHub Actions cache (v2 API). Wires a
  substituter and post-build-hook into nix.conf.

branding:
  icon: archive
  color: purple

inputs:
  binary:
    description: >
      Path to a pre-built hestia binary (e.g. the result of `nix build`).
      Takes precedence over `version`.
    required: false
    default: ""
  version:
    description: >
      Hestia release tag to download from GitHub releases
      (e.g. "v0.1.0-beta.1"), or "latest" to auto-resolve the newest
      release.  The downloaded binary is verified against GitHub's build
      provenance attestations before it runs.
    required: false
    default: "latest"
  github-token:
    description: >
      Token for the attestation API lookup that verifies downloaded release
      binaries.
    required: false
    default: ${{ github.token }}
  listen:
    description: >
      Address the substituter HTTP server listens on. Defaults to 127.0.0.1
      with a free port picked per invocation, so the action can run more
      than once in a job without the daemons colliding.
    required: false
    default: ""
  socket:
    description: >
      Unix socket path for the post-build-hook listener. Defaults to a
      per-invocation path under the runner's temp directory.
    required: false
    default: ""
  drain-timeout:
    description: >
      Maximum number of seconds the post-job step waits for the final upload
      (chunking, pack upload, manifest commit).
    required: false
    default: "300"
  upstream-cache-filter:
    description: >
      Skip paths signed by an upstream cache (cache.nixos.org by default)
      instead of caching them. Saves GHA cache quota for projects with big
      nixpkgs closures.
    required: false
    default: "false"
  upstream-cache-key-names:
    description: >
      Space-separated signing key names treated as upstream caches by
      `upstream-cache-filter`.
    required: false
    default: ""
  no-closure:
    description: >
      Cache built paths only, without their runtime closure (dependencies
      stay on upstream caches).
    required: false
    default: "false"
  wait-manifest-version:
    description: >
      Wait up to 60s at daemon startup until the cache manifest has at least
      this version. Matrix build jobs pass the eval job's `manifest-version`
      output so the just-uploaded drv closures are visible despite GHA cache
      lookup lag.
    required: false
    default: "0"

# If both `binary` and `version` are explicitly empty, the action only
# captures and exports the cache tokens (ACTIONS_RUNTIME_TOKEN / ACTIONS_RESULTS_URL).
# That mode exists for setups that run hestia themselves -- for example
# hestia's own integration tests against the real cache API.

runs:
  using: node24
  # Deprecated entry point; see deprecated-main.js.
  main: deprecated-main.js
  post: deprecated-post.js
